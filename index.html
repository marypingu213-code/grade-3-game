<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生字語詞拉霸機 - 多人搶答版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; touch-action: manipulation; }
        .buzzer-btn { 
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            box-shadow: 0 10px 0 #96281b, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }
        .buzzer-btn:active:not(:disabled) { transform: translateY(10px); box-shadow: 0 0 0 #96281b, 0 5px 10px rgba(0,0,0,0.4); }
        .buzzer-btn:disabled { filter: grayscale(100%); cursor: not-allowed; opacity: 0.6; transform: translateY(5px); box-shadow: none; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .slot-spin { filter: blur(4px); opacity: 0.7; transform: translateY(-10px); }
    </style>
</head>
<body class="h-full bg-gray-100 text-gray-800">

    <div id="app" class="w-full h-full flex flex-col items-center justify-center">
        <div id="loadingScreen" class="text-2xl font-bold">系統初始化中...</div>
    </div>

    <template id="tpl-landing">
        <div class="flex flex-col gap-8 items-center p-8 bg-white rounded-3xl shadow-xl max-w-lg w-full text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🎰 語詞拉霸機</h1>
            <p class="text-gray-500 mb-4">超刺激的課堂單字搶答遊戲</p>
            <button onclick="initTeacher()" class="w-full py-6 text-2xl font-bold text-white bg-blue-500 rounded-2xl shadow-lg hover:bg-blue-600 transition">
                我是老師 (建立房間)
            </button>
            <div class="w-full border-t border-gray-200"></div>
            <p class="text-gray-500 text-sm">學生掃描 QR Code 即可自動加入</p>
        </div>
    </template>

    <template id="tpl-teacher">
        <div class="w-full h-full flex p-2 gap-2 overflow-hidden bg-gray-200">
            <div class="flex-1 relative bg-gray-800 rounded-2xl shadow-inner flex flex-col items-center justify-center p-8 border-8 border-gray-700">
                <div class="w-full max-w-3xl bg-white rounded-3xl border-[12px] border-gray-300 shadow-2xl p-10 flex items-center justify-center" style="height: 45vh;">
                    <div id="slotDisplay" class="text-7xl md:text-9xl font-black text-gray-800 tracking-widest text-center">準備開始</div>
                </div>
                <div id="winnerArea" class="hidden absolute inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm">
                    <div class="bg-red-600 text-white px-12 py-8 rounded-3xl shadow-2xl text-5xl md:text-7xl font-bold border-4 border-white pop-in text-center flex flex-col gap-4">
                        <span id="winnerName" class="text-yellow-300"></span>
                        <span>搶答成功！</span>
                        <button onclick="game.resetRound()" class="mt-4 text-xl bg-white text-red-600 py-2 rounded-full">下一題</button>
                    </div>
                </div>
            </div>

            <div class="w-80 bg-white rounded-2xl shadow-lg flex flex-col p-4 border-2 border-gray-300">
                <div class="mb-4 text-center">
                    <div id="qrcode" class="flex justify-center my-2 p-1 bg-white border-2 border-dashed border-gray-300 rounded-xl"></div>
                    <div class="text-[10px] font-bold text-blue-600 bg-blue-50 py-1 rounded break-all" id="roomIdDisplay"></div>
                </div>
                
                <div class="mb-4">
                    <h3 class="font-bold text-sm text-gray-600 mb-1">📖 選擇課次</h3>
                    <select id="lessonSelect" onchange="loadLessonWords()" class="w-full p-2 border-2 border-indigo-200 rounded-lg text-sm bg-indigo-50 font-bold outline-none">
                        <option value="">-- 請選擇課次 --</option>
                        <option value="L1">第一課：雲朵、模樣...</option>
                        <option value="L2">第二課：鐵環、湯碗...</option>
                        <option value="L3">第三課：炎熱、愛玉...</option>
                        <option value="L4">第四課：丞相、反應...</option>
                        <option value="L5">第五課：鞠躬、弄哭...</option>
                        <option value="L6">第六課：村莊、發抖...</option>
                    </select>
                </div>

                <div class="mb-4">
                    <textarea id="wordInput" class="w-full h-24 p-2 border-2 border-gray-200 rounded-xl text-sm outline-none resize-none" placeholder="語詞會自動顯示於此"></textarea>
                    <button onclick="updateWords()" class="mt-2 w-full py-2 bg-indigo-500 text-white hover:bg-indigo-600 rounded-lg text-sm font-bold shadow-md">✅ 更新題庫</button>
                </div>

                <div class="flex-1 overflow-y-auto mb-4 border-2 border-gray-100 rounded-xl p-2 bg-gray-50">
                    <h3 class="font-bold text-sm text-gray-600 mb-2 border-b">已連線學生 (<span id="studentCount">0</span>)</h3>
                    <div id="studentList" class="space-y-1 text-sm"></div>
                </div>
                <button id="spinBtn" onclick="game.teacherSpin()" class="py-4 bg-green-500 text-white rounded-xl font-black text-2xl shadow-[0_6px_0_#16a34a] active:shadow-none active:translate-y-1">🎰 開始拉霸</button>
            </div>
        </div>
    </template>

    <template id="tpl-student">
        <div class="w-full h-full flex flex-col items-center justify-between p-6 bg-slate-900 text-white">
            <div class="w-full flex justify-between items-center bg-white/10 p-3 rounded-2xl">
                <div class="text-lg">代號: <span id="myStudentName" class="font-bold text-yellow-400"></span></div>
                <div class="text-sm px-2 py-1 rounded bg-green-600">連線成功</div>
            </div>
            <div class="flex-1 flex flex-col items-center justify-center w-full">
                <div id="studentMessage" class="text-xl text-gray-400 mb-4 text-center">等待老師啟動遊戲...</div>
                <div id="studentWord" class="text-7xl font-black text-yellow-400 hidden pop-in text-center break-all shadow-lg"></div>
            </div>
            <button id="buzzerBtn" onclick="game.studentBuzz()" disabled class="buzzer-btn w-64 h-64 rounded-full text-5xl font-black text-white border-8 border-red-900 mb-10">
                搶答
            </button>
        </div>
    </template>

    <script>
        // --- 課程語詞資料庫 ---
        const lessons = {
            "L1": "雲朵,模樣,臉蛋,音符,翅膀,搗亂,恐龍,吼叫,雨傘",
            "L2": "鐵環,湯碗,彎鉤,推動,羨慕,捲髮,躺下,裙擺,笑容",
            "L3": "炎熱,愛玉,甜品,斑點,曬乾,搓洗,糖水,棉袋,容器",
            "L4": "丞相,反應,官府,門框,回報,奶酪,吃驚,出差,眼神",
            "L5": "鞠躬,弄哭,厲害,鬥嘴,逗趣,睜眼,閉眼,警察,小偷,胡說",
            "L6": "村莊,發抖,彈簧,松鼠,混亂,建造,展開,巨大,觀看"
        };

        function loadLessonWords() {
            const lessonKey = document.getElementById('lessonSelect').value;
            if (lessons[lessonKey]) {
                document.getElementById('wordInput').value = lessons[lessonKey];
                updateWords(); // 自動執行更新
            }
        }

        let peer, conn;
        let students = {};
        const app = document.getElementById('app');
        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');

        window.onload = () => {
            if (roomFromUrl) { initStudent(roomFromUrl); } 
            else { render('tpl-landing'); }
        };

        function render(templateId) {
            const tpl = document.getElementById(templateId);
            app.innerHTML = '';
            app.appendChild(tpl.content.cloneNode(true));
        }

        function initTeacher() {
            render('tpl-teacher');
            peer = new Peer();
            peer.on('open', id => {
                const roomUrl = `${window.location.origin}${window.location.pathname}?room=${id}`;
                document.getElementById('roomIdDisplay').innerText = `房號: ${id}`;
                new QRCode(document.getElementById("qrcode"), { text: roomUrl, width: 120, height: 120 });
            });
            peer.on('connection', c => {
                c.on('open', () => {
                    const studentId = "學生" + (Object.keys(students).length + 1);
                    students[c.peer] = { conn: c, name: studentId };
                    updateStudentList();
                    c.send({ type: 'WELCOME', name: studentId });
                });
                c.on('data', data => { if (data.type === 'BUZZ') game.handleBuzz(c.peer); });
                c.on('close', () => { delete students[c.peer]; updateStudentList(); });
            });
        }

        function updateStudentList() {
            const list = document.getElementById('studentList');
            const count = document.getElementById('studentCount');
            if (!list) return;
            list.innerHTML = Object.values(students).map(s => `<div class="bg-white p-2 rounded shadow-sm border-l-4 border-blue-500 font-bold">${s.name}</div>`).join('');
            count.innerText = Object.keys(students).length;
        }

        function updateWords() {
            const input = document.getElementById('wordInput').value;
            game.words = input.split(/[,，\s\n]/).filter(w => w.trim() !== "");
            console.log("題庫已更新", game.words);
        }

        function initStudent(roomId) {
            render('tpl-student');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(roomId);
                conn.on('data', data => {
                    const msg = document.getElementById('studentMessage');
                    const word = document.getElementById('studentWord');
                    const btn = document.getElementById('buzzerBtn');
                    if (data.type === 'WELCOME') document.getElementById('myStudentName').innerText = data.name;
                    if (data.type === 'SPIN_START') { msg.innerText = "🎰 拉霸轉動中..."; word.classList.add('hidden'); btn.disabled = true; }
                    if (data.type === 'SPIN_STOP') { msg.innerText = "🔥 趕快搶答！"; word.innerText = data.word; word.classList.remove('hidden'); btn.disabled = false; }
                    if (data.type === 'WINNER_IS') { msg.innerText = "📣 " + data.name + " 獲勝！"; btn.disabled = true; }
                    if (data.type === 'RESET') { msg.innerText = "等待下一題..."; word.classList.add('hidden'); btn.disabled = true; }
                });
                conn.on('close', () => { alert('連線已中斷，請重新掃碼'); window.location.href = window.location.pathname; });
            });
        }

        const game = {
            words: ["請先選擇課次"],
            isSpinning: false,
            winner: null,
            teacherSpin() {
                if (this.isSpinning || this.words.length === 0 || this.words[0] === "請先選擇課次") return;
                this.isSpinning = true; this.winner = null;
                Object.values(students).forEach(s => s.conn.send({ type: 'SPIN_START' }));
                const display = document.getElementById('slotDisplay');
                display.classList.add('slot-spin');
                let count = 0;
                const interval = setInterval(() => {
                    display.innerText = this.words[Math.floor(Math.random() * this.words.length)];
                    if (count++ > 25) {
                        clearInterval(interval);
                        const finalWord = display.innerText;
                        display.classList.remove('slot-spin');
                        this.isSpinning = false;
                        // 語音朗讀
                        const utter = new SpeechSynthesisUtterance(finalWord);
                        utter.lang = 'zh-TW';
                        window.speechSynthesis.speak(utter);
                        Object.values(students).forEach(s => s.conn.send({ type: 'SPIN_STOP', word: finalWord }));
                    }
                }, 80);
            },
            studentBuzz() { if (conn) conn.send({ type: 'BUZZ' }); },
            handleBuzz(peerId) {
                if (this.winner) return;
                this.winner = students[peerId].name;
                document.getElementById('winnerName').innerText = this.winner;
                document.getElementById('winnerArea').classList.remove('hidden');
                Object.values(students).forEach(s => s.conn.send({ type: 'WINNER_IS', name: this.winner }));
            },
            resetRound() {
                this.winner = null;
                document.getElementById('winnerArea').classList.add('hidden');
                document.getElementById('slotDisplay').innerText = "準備開始";
                Object.values(students).forEach(s => s.conn.send({ type: 'RESET' }));
            }
        };
    </script>
</body>
</html>
