<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生字語詞雙轉輪拉霸機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; touch-action: manipulation; }
        .buzzer-btn { 
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            box-shadow: 0 10px 0 #96281b, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }
        .buzzer-btn:active:not(:disabled) { transform: translateY(10px); box-shadow: 0 0 0 #96281b, 0 5px 10px rgba(0,0,0,0.4); }
        .buzzer-btn:disabled { filter: grayscale(100%); opacity: 0.6; transform: translateY(5px); box-shadow: none; }
        
        /* 雙轉輪旋轉動畫 */
        .slot-container {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }
        .slot-box {
            flex: 1;
            background: white;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            border: 8px solid #ddd;
            font-size: 4rem;
            font-weight: 900;
            overflow: hidden;
        }
        .slot-spin { filter: blur(4px); transform: translateY(-5px); opacity: 0.7; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="h-full bg-gray-100">

    <div id="app" class="w-full h-full flex items-center justify-center">
        <div class="text-2xl font-bold">載入中...</div>
    </div>

    <template id="tpl-teacher">
        <div class="w-full h-full flex p-4 gap-4 bg-gray-200">
            <div class="flex-1 bg-gray-800 rounded-3xl p-8 flex flex-col items-center justify-center relative border-[10px] border-gray-700 shadow-2xl">
                
                <div class="slot-container">
                    <div id="slotLeft" class="slot-box">?</div>
                    <div id="slotRight" class="slot-box">?</div>
                </div>

                <div id="winnerArea" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50 rounded-2xl">
                    <div class="bg-red-600 text-white p-10 rounded-3xl text-center pop-in">
                        <h2 id="winnerName" class="text-5xl font-black text-yellow-300 mb-4"></h2>
                        <p class="text-3xl">搶答成功！</p>
                        <button onclick="game.resetRound()" class="mt-6 px-8 py-2 bg-white text-red-600 rounded-full font-bold">下一題</button>
                    </div>
                </div>
            </div>

            <div class="w-80 bg-white rounded-3xl p-4 shadow-xl flex flex-col">
                <div id="qrcode" class="flex justify-center mb-2"></div>
                <p id="roomIdDisplay" class="text-[10px] text-center mb-4 font-mono"></p>
                
                <label class="text-xs font-bold text-gray-500">選擇課次</label>
                <select id="lessonSelect" onchange="loadLesson()" class="w-full p-2 mb-4 bg-blue-50 border-2 border-blue-200 rounded-lg font-bold">
                    <option value="">-- 請選擇 --</option>
                    <option value="L1">第一課</option>
                    <option value="L2">第二課</option>
                    <option value="L3">第三課</option>
                    <option value="L4">第四課</option>
                    <option value="L5">第五課</option>
                    <option value="L6">第六課</option>
                </select>

                <textarea id="wordInput" class="w-full h-20 p-2 text-sm border rounded-xl mb-2" placeholder="語詞用逗號隔開"></textarea>
                
                <div class="flex-1 overflow-y-auto bg-gray-50 rounded-xl p-2 mb-4">
                    <p class="text-xs font-bold border-b mb-2">已加入學生 (<span id="count">0</span>)</p>
                    <div id="sList" class="space-y-1"></div>
                </div>

                <button id="spinBtn" onclick="game.startSpin()" class="w-full py-4 bg-green-500 text-white text-2xl font-black rounded-2xl shadow-[0_6px_0_#16a34a]">🎰 啟動拉霸</button>
            </div>
        </div>
    </template>

    <template id="tpl-student">
        <div class="w-full h-full flex flex-col items-center justify-between p-6 bg-slate-900 text-white">
            <div class="w-full flex justify-between bg-white/10 p-4 rounded-2xl">
                <span>代號: <b id="myName" class="text-yellow-400"></b></span>
                <span class="text-green-400">● 連線中</span>
            </div>
            
            <div class="text-center">
                <div id="sStatus" class="text-xl text-gray-400 mb-6">等待老師啟動</div>
                <div id="sDisplay" class="text-5xl font-black text-yellow-300 hidden"></div>
            </div>

            <button id="buzzerBtn" onclick="game.sendBuzz()" disabled class="buzzer-btn w-64 h-64 rounded-full text-5xl font-black mb-10">搶答</button>
        </div>
    </template>

    <script>
        const lessons = {
            "L1": "雲朵,模樣,臉蛋,音符,翅膀,搗亂,恐龍,吼叫,雨傘",
            "L2": "鐵環,湯碗,彎鉤,推動,羨慕,捲髮,躺下,裙擺,笑容",
            "L3": "炎熱,愛玉,甜品,斑點,曬乾,搓洗,糖水,棉袋,容器",
            "L4": "丞相,反應,官府,門框,回報,奶酪,吃驚,出差,眼神",
            "L5": "鞠躬,弄哭,厲害,鬥嘴,逗趣,睜眼,閉眼,警察,小偷,胡說",
            "L6": "村莊,發抖,彈簧,松鼠,混亂,建造,展開,巨大,觀看"
        };

        let peer, conn, students = {};
        const urlParams = new URLSearchParams(window.location.search);
        const rid = urlParams.get('room');

        window.onload = () => rid ? initStudent(rid) : render('tpl-landing');

        function render(id) {
            const t = document.getElementById(id);
            if(!t) { // 預防 landing 沒寫
                document.getElementById('app').innerHTML = `<button onclick="initTeacher()" class="bg-blue-500 text-white p-10 rounded-2xl text-2xl font-bold">開啟老師端 (建立房間)</button>`;
                return;
            }
            document.getElementById('app').innerHTML = '';
            document.getElementById('app').appendChild(t.content.cloneNode(true));
        }

        function loadLesson() {
            const val = document.getElementById('lessonSelect').value;
            if(lessons[val]) document.getElementById('wordInput').value = lessons[val];
        }

        function initTeacher() {
            render('tpl-teacher');
            peer = new Peer();
            peer.on('open', id => {
                const url = `${window.location.origin}${window.location.pathname}?room=${id}`;
                document.getElementById('roomIdDisplay').innerText = id;
                new QRCode(document.getElementById("qrcode"), { text: url, width: 120, height: 120 });
            });
            peer.on('connection', c => {
                c.on('open', () => {
                    const sName = "學生" + (Object.keys(students).length + 1);
                    students[c.peer] = { conn: c, name: sName };
                    c.send({ type: 'HI', name: sName });
                    updateSList();
                });
                c.on('data', data => data.type === 'BUZZ' && game.onBuzz(c.peer));
            });
        }

        function updateSList() {
            document.getElementById('count').innerText = Object.keys(students).length;
            document.getElementById('sList').innerHTML = Object.values(students).map(s => `<div class="bg-white p-1 rounded border text-sm">${s.name}</div>`).join('');
        }

        function initStudent(room) {
            render('tpl-student');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(room);
                conn.on('data', d => {
                    const disp = document.getElementById('sDisplay');
                    const stat = document.getElementById('sStatus');
                    const btn = document.getElementById('buzzerBtn');
                    if(d.type === 'HI') document.getElementById('myName').innerText = d.name;
                    if(d.type === 'START') { stat.innerText = "轉動中..."; disp.classList.add('hidden'); btn.disabled = true; }
                    if(d.type === 'STOP') { stat.innerText = "快搶答！"; disp.innerText = d.word; disp.classList.remove('hidden'); btn.disabled = false; }
                    if(d.type === 'WIN') { stat.innerText = d.name + " 搶到了！"; btn.disabled = true; }
                    if(d.type === 'RESET') { stat.innerText = "等待下一題"; disp.classList.add('hidden'); btn.disabled = true; }
                });
            });
        }

        const game = {
            isSpinning: false,
            winner: null,
            startSpin() {
                const words = document.getElementById('wordInput').value.split(/[,，\s]/).filter(x => x);
                if(this.isSpinning || words.length < 1) return;
                
                this.isSpinning = true; this.winner = null;
                Object.values(students).forEach(s => s.conn.send({ type: 'START' }));
                
                const L = document.getElementById('slotLeft');
                const R = document.getElementById('slotRight');
                L.classList.add('slot-spin'); R.classList.add('slot-spin');

                let timer = 0;
                const run = setInterval(() => {
                    L.innerText = words[Math.floor(Math.random() * words.length)];
                    R.innerText = words[Math.floor(Math.random() * words.length)];
                    if(timer++ > 30) {
                        clearInterval(run);
                        L.classList.remove('slot-spin'); R.classList.remove('slot-spin');
                        this.isSpinning = false;
                        const res = L.innerText + " " + R.innerText;
                        
                        // 語音讀一次
                        const u = new SpeechSynthesisUtterance(L.innerText + R.innerText);
                        u.lang = 'zh-TW'; window.speechSynthesis.speak(u);
                        
                        Object.values(students).forEach(s => s.conn.send({ type: 'STOP', word: res }));
                    }
                }, 70);
            },
            sendBuzz() { if(conn) conn.send({ type: 'BUZZ' }); },
            onBuzz(id) {
                if(this.winner) return;
                this.winner = students[id].name;
                document.getElementById('winnerName').innerText = this.winner;
                document.getElementById('winnerArea').classList.remove('hidden');
                Object.values(students).forEach(s => s.conn.send({ type: 'WIN', name: this.winner }));
            },
            resetRound() {
                this.winner = null;
                document.getElementById('winnerArea').classList.add('hidden');
                document.getElementById('slotLeft').innerText = "?";
                document.getElementById('slotRight').innerText = "?";
                Object.values(students).forEach(s => s.conn.send({ type: 'RESET' }));
            }
        };
    </script>
</body>
</html>
