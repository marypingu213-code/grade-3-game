<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生字部件組字拉霸機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; touch-action: manipulation; }
        .buzzer-btn { 
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            box-shadow: 0 10px 0 #96281b, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }
        .buzzer-btn:active:not(:disabled) { transform: translateY(10px); box-shadow: 0 0 0 #96281b, 0 5px 10px rgba(0,0,0,0.4); }
        .buzzer-btn:disabled { filter: grayscale(100%); cursor: not-allowed; transform: translateY(10px); box-shadow: none; opacity: 0.6; }

        /* 垂直滾動拉霸核心樣式 */
        .slot-machine {
            display: flex;
            gap: 20px;
            justify-content: center;
            perspective: 1000px;
        }
        .reel {
            width: 180px;
            height: 250px;
            background: white;
            border: 8px solid #cbd5e1;
            border-radius: 20px;
            position: relative;
            overflow: hidden; /* 隱藏框外的字 */
        }
        .reel-container {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s linear;
        }
        .slot-item {
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            font-weight: 900;
            flex-shrink: 0;
        }
        /* 模糊效果 */
        .spinning { filter: blur(3px); }
        
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="h-full bg-gray-100 text-gray-800">

    <div id="app" class="w-full h-full flex items-center justify-center">
        <div id="loadingScreen" class="text-2xl font-bold">系統初始化中...</div>
    </div>

    <template id="tpl-teacher">
        <div class="w-full h-full flex p-2 gap-2 overflow-hidden bg-gray-200">
            <div class="flex-1 relative bg-gray-800 rounded-2xl flex flex-col items-center justify-center p-8 border-8 border-gray-700">
                
                <div class="slot-machine">
                    <div class="reel spinning-container" id="reelLeft">
                        <div class="reel-container" id="containerLeft">
                            <div class="slot-item">?</div>
                        </div>
                    </div>
                    <div class="reel spinning-container" id="reelRight">
                        <div class="reel-container" id="containerRight">
                            <div class="slot-item">?</div>
                        </div>
                    </div>
                </div>

                <div id="winnerArea" class="hidden absolute inset-0 bg-black/70 flex items-center justify-center z-50 rounded-xl">
                    <div class="bg-red-600 text-white px-12 py-8 rounded-3xl text-center pop-in flex flex-col gap-4 shadow-2xl">
                        <span id="winnerName" class="text-6xl font-black text-yellow-300"></span>
                        <span class="text-3xl font-bold">搶答成功！</span>
                        <button onclick="game.resetRound()" class="mt-4 py-2 bg-white text-red-600 rounded-xl font-bold">下一題</button>
                    </div>
                </div>
            </div>

            <div class="w-80 bg-white rounded-2xl shadow-lg flex flex-col p-4 border-2 border-gray-300">
                <div class="mb-4 text-center">
                    <div id="qrcode" class="flex justify-center mb-2"></div>
                    <div class="text-[10px] font-mono text-blue-600" id="roomIdDisplay"></div>
                </div>

                <div class="mb-4">
                    <h3 class="font-bold text-sm text-gray-600 mb-1">📖 選擇組字課程</h3>
                    <select id="lessonSelect" onchange="loadLesson()" class="w-full p-2 border-2 border-indigo-200 rounded-xl text-sm font-bold bg-indigo-50">
                        <option value="">-- 請選擇課次 --</option>
                        <option value="L1">L1 雲/模/臉...</option>
                        <option value="L2">L2 鐵/碗/彎...</option>
                        <option value="L3">L3 炎/斑/曬...</option>
                        <option value="L4">L4 丞/相/框...</option>
                        <option value="L5">L5 鞠/哭/厲...</option>
                        <option value="L6">L6 村/抖/彈...</option>
                    </select>
                </div>

                <div class="mb-4">
                    <p class="text-[10px] text-gray-400">左部件 (逗號隔開)</p>
                    <textarea id="leftInput" class="w-full h-12 p-1 border rounded text-xs mb-1">氵,亻,木,口,釒</textarea>
                    <p class="text-[10px] text-gray-400">右部件 (逗號隔開)</p>
                    <textarea id="rightInput" class="w-full h-12 p-1 border rounded text-xs">工,可,主,良,本</textarea>
                </div>

                <div class="flex-1 overflow-y-auto mb-4 border rounded p-2 bg-gray-50 text-xs">
                    <div id="studentCount" class="font-bold text-blue-600">已連線學生：0</div>
                    <div id="studentList" class="mt-1 space-y-1"></div>
                </div>

                <button id="spinBtn" onclick="game.teacherSpin()" class="py-4 bg-green-500 text-white rounded-xl font-black text-2xl shadow-[0_6px_0_#16a34a] active:translate-y-1">🎰 開始滾動</button>
            </div>
        </div>
    </template>

    <template id="tpl-student">
        <div class="w-full h-full flex flex-col items-center justify-between p-6 bg-slate-900 text-white">
            <div class="w-full flex justify-between items-center bg-white/10 p-4 rounded-2xl">
                <div>代號: <span id="myStudentName" class="text-yellow-400 font-bold"></span></div>
                <div class="text-xs text-green-400">● 連線成功</div>
            </div>
            <div class="text-center">
                <div id="studentMessage" class="text-xl text-gray-400 mb-4">準備好搶答了嗎？</div>
                <div id="studentWord" class="text-6xl font-black text-yellow-300 hidden"></div>
            </div>
            <button id="buzzerBtn" onclick="game.studentBuzz()" disabled class="buzzer-btn w-64 h-64 rounded-full text-5xl font-black mb-10">搶答</button>
        </div>
    </template>

    <script>
        // --- 部件題庫資料 (左, 右) ---
        const lessons = {
            "L1": { l: "雨,木,月,音,羽,扌,龍,口,雨", r: "云,莫,僉,立,白,月,立,孔,散" },
            "L2": { l: "釒,石,弓,扌,羊,毛,身,衣,口", r: "失,宛,亦,隹,羨,卷,尚,且,天" },
            "L3": { l: "火,王,食,文,日,扌,米,巾,宀", r: "炎,玉,品,斑,麗,差,唐,白,容" },
            "L4": { l: "丞,木,宀,木,扌,酉,口,口,目", r: "相,應,府,匡,報,酪,驚,差,申" },
            "L5": { l: "革,口,ㄏ,口,豆,目,目,言,人,口", r: "匊,哭,萬,且,句,爭,閉,察,偸,說" },
            "L6": { l: "木,扌,弓,木,氵,廴,門,大,見", r: "寸,斗,黃,鼠,昆,廷,展,巨,莧" }
        };

        let peer, conn, students = {};
        const app = document.getElementById('app');
        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');

        window.onload = () => roomFromUrl ? initStudent(roomFromUrl) : render('tpl-landing');

        function render(id) {
            const t = document.getElementById(id);
            if(!t) { // 處理 Landing
                app.innerHTML = `<button onclick="initTeacher()" class="bg-blue-500 text-white p-8 rounded-2xl text-2xl font-bold shadow-xl">Diamond 老師啟動端</button>`;
                return;
            }
            app.innerHTML = '';
            app.appendChild(t.content.cloneNode(true));
        }

        function loadLesson() {
            const key = document.getElementById('lessonSelect').value;
            if(lessons[key]) {
                document.getElementById('leftInput').value = lessons[key].l;
                document.getElementById('rightInput').value = lessons[key].r;
            }
        }

        function initTeacher() {
            render('tpl-teacher');
            peer = new Peer();
            peer.on('open', id => {
                const url = `${window.location.origin}${window.location.pathname}?room=${id}`;
                document.getElementById('roomIdDisplay').innerText = `ROOM ID: ${id}`;
                new QRCode(document.getElementById("qrcode"), { text: url, width: 120, height: 120 });
            });
            peer.on('connection', c => {
                c.on('open', () => {
                    const sName = "學生" + (Object.keys(students).length + 1);
                    students[c.peer] = { conn: c, name: sName };
                    updateSList();
                    c.send({ type: 'HI', name: sName });
                });
                c.on('data', d => d.type === 'BUZZ' && game.onBuzz(c.peer));
            });
        }

        function updateSList() {
            document.getElementById('studentCount').innerText = `已連線學生：${Object.keys(students).length}`;
            document.getElementById('studentList').innerHTML = Object.values(students).map(s => `<div class="bg-white p-1 border rounded">${s.name}</div>`).join('');
        }

        function initStudent(room) {
            render('tpl-student');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(room);
                conn.on('data', d => {
                    const msg = document.getElementById('studentMessage');
                    const word = document.getElementById('studentWord');
                    const btn = document.getElementById('buzzerBtn');
                    if(d.type === 'HI') document.getElementById('myStudentName').innerText = d.name;
                    if(d.type === 'START') { msg.innerText = "正在滾動中..."; word.classList.add('hidden'); btn.disabled = true; }
                    if(d.type === 'STOP') { msg.innerText = "趕快拼出正確字！"; word.innerText = d.word; word.classList.remove('hidden'); btn.disabled = false; }
                    if(d.type === 'WIN') { msg.innerText = d.name + " 搶到了！"; btn.disabled = true; }
                    if(d.type === 'RESET') { msg.innerText = "等待老師下一題..."; word.classList.add('hidden'); btn.disabled = true; }
                });
            });
        }

        const game = {
            isSpinning: false,
            winner: null,
            teacherSpin() {
                const L_list = document.getElementById('leftInput').value.split(/[,，]/);
                const R_list = document.getElementById('rightInput').value.split(/[,，]/);
                if(this.isSpinning) return;
                
                this.isSpinning = true; this.winner = null;
                Object.values(students).forEach(s => s.conn.send({ type: 'START' }));
                
                this.animateReel('containerLeft', L_list);
                this.animateReel('containerRight', R_list).then(finalParts => {
                    this.isSpinning = false;
                    const resultText = finalParts.left + " + " + finalParts.right;
                    Object.values(students).forEach(s => s.conn.send({ type: 'STOP', word: resultText }));
                    
                    // 朗讀部件
                    const u = new SpeechSynthesisUtterance(finalParts.left + " " + finalParts.right);
                    u.lang = 'zh-TW'; window.speechSynthesis.speak(u);
                });
            },

            async animateReel(id, list) {
                const container = document.getElementById(id);
                const itemHeight = 250;
                container.classList.add('spinning');
                
                // 隨機生成 20 個滾動元素
                let scrollData = [];
                for(let i=0; i<20; i++) scrollData.push(list[Math.floor(Math.random()*list.length)]);
                const finalWord = list[Math.floor(Math.random()*list.length)];
                scrollData.push(finalWord);

                container.innerHTML = scrollData.map(w => `<div class="slot-item">${w}</div>`).join('');
                
                // 執行 CSS 滾動動畫
                const totalDist = (scrollData.length - 1) * itemHeight;
                container.style.transition = `transform 3s cubic-bezier(0.15, 0, 0.15, 1)`;
                container.style.transform = `translateY(-${totalDist}px)`;

                return new Promise(resolve => {
                    setTimeout(() => {
                        container.classList.remove('spinning');
                        // 這裡回傳兩邊的結果，所以要判斷是哪一邊
                        if(id === 'containerLeft') this._tempLeft = finalWord;
                        else resolve({left: this._tempLeft, right: finalWord});
                    }, 3000);
                });
            },

            studentBuzz() { if(conn) conn.send({ type: 'BUZZ' }); },
            onBuzz(pid) {
                if(this.winner) return;
                this.winner = students[pid].name;
                document.getElementById('winnerName').innerText = this.winner;
                document.getElementById('winnerArea').classList.remove('hidden');
                Object.values(students).forEach(s => s.conn.send({ type: 'WIN', name: this.winner }));
            },
            resetRound() {
                this.winner = null;
                document.getElementById('winnerArea').classList.add('hidden');
                document.getElementById('containerLeft').style.transition = 'none';
                document.getElementById('containerRight').style.transition = 'none';
                document.getElementById('containerLeft').style.transform = 'translateY(0)';
                document.getElementById('containerRight').style.transform = 'translateY(0)';
                document.getElementById('containerLeft').innerHTML = '<div class="slot-item">?</div>';
                document.getElementById('containerRight').innerHTML = '<div class="slot-item">?</div>';
                Object.values(students).forEach(s => s.conn.send({ type: 'RESET' }));
            }
        };
    </script>
</body>
</html>
